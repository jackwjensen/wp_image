name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/opt/apps/${{ github.event.repository.name }}"
            cd "$APP_DIR"

            # Rollback function
            PREV_COMMIT=$(git rev-parse HEAD)
            rollback() {
              echo "Deployment failed! Rolling back..."
              git checkout "$PREV_COMMIT"
              docker compose up --force-recreate -d
              echo "Rollback complete."
              exit 1
            }
            trap rollback ERR

            # Pull latest code
            git pull origin master

            # Prune old images
            docker image prune -f --filter "until=72h" || true

            # Recreate containers (using official image, no build needed)
            docker compose up --force-recreate -d

            # Wait for WordPress to start
            echo "Waiting for WordPress to start..."
            sleep 15

            # Health check
            RUNNING=$(docker compose ps --status running --format json | grep -c "running" || true)
            if [ "$RUNNING" -lt 2 ]; then
              echo "Health check failed: only $RUNNING containers running"
              exit 1
            fi

            echo "Deployment successful!"
